<!doctype html>
<html>
<head>

<meta charset="UTF-8">
<title>2026 TV Shows</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#f5f8ff;
color:#1a1a1a;
padding:40px;
}

h1{
color:#2563eb;
margin-bottom:5px;
}

p{
color:#555;
margin-top:0;
}

.controls{
margin:20px 0;
display:flex;
gap:20px;
flex-wrap:wrap;
}

select{
padding:8px;
border-radius:6px;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 3px 15px rgba(0,0,0,0.06);
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
cursor:pointer;
color:#2563eb;
font-weight:600;
background:#eef3ff;
}

th:hover{
background:#e2e9ff;
}

.poster{
width:50px;
border-radius:6px;
}

.logo{
height:20px;
}

.trending{
color:#ff6b00;
font-weight:600;
}

button{
background:#2563eb;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<h1>Most Popular TV Shows Released in 2026</h1>
<p>Sorted by viewer demand</p>

<div class="controls">

<label>
Streaming Service
<select id="serviceFilter">
<option value="all">All</option>
</select>
</label>

<label>
Minimum Rating
<select id="ratingFilter">
<option value="0">All</option>
<option value="6">6+</option>
<option value="7">7+</option>
<option value="8">8+</option>
</select>
</label>

</div>

<table>

<thead>

<tr>
<th data-sort="rank">#</th>
<th>Poster</th>
<th data-sort="title">Title</th>
<th data-sort="release">Release</th>
<th data-sort="service">Service</th>
<th data-sort="rating">IMDb</th>
<th data-sort="rt">Rotten Tomatoes</th>
<th data-sort="demand">Demand</th>
<th>Trailer</th>
</tr>

</thead>

<tbody id="results"></tbody>

</table>

<script src="tv.js"></script>

</body>
</html>
