<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Book Club Tracker — Oprah & Reese × King County Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*, *::before, *::after { box-sizing:border-box }

body{
font-family:'Inter',sans-serif;
background:#f0f4f8;
margin:0;
color:#1e293b;
}

header{
background:#fff;
border-bottom:1px solid #e2e8f0;
padding:20px 24px;
position:sticky;
top:0;
z-index:10;
}

header h1{
margin:0 0 4px;
font-size:20px;
font-weight:800;
}

header p{
margin:0;
font-size:13px;
color:#64748b;
}

#last-updated{
font-size:12px;
color:#94a3b8;
margin-top:4px;
}

.filter-bar{
display:flex;
gap:8px;
padding:16px 24px 0;
flex-wrap:wrap;
}

.filter-btn{
padding:6px 14px;
border-radius:20px;
border:1px solid #e2e8f0;
background:#fff;
font-size:12px;
font-weight:600;
cursor:pointer;
color:#475569;
}

.filter-btn.active-oprah{background:#faf5ff;color:#7c3aed;border-color:#c4b5fd}
.filter-btn.active-reese{background:#fff1f2;color:#e11d48;border-color:#fda4af}
.filter-btn.active-all{background:#eff6ff;color:#1d4ed8;border-color:#93c5fd}

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:16px;
padding:16px 24px 32px;
}

.card{
background:#fff;
border-radius:12px;
padding:14px;
box-shadow:0 1px 4px rgba(0,0,0,.06);
border:1px solid #f1f5f9;
display:flex;
flex-direction:column;
gap:8px;
}

.card-top{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:8px;
}

.club-pill{
font-size:9px;
font-weight:700;
letter-spacing:.5px;
text-transform:uppercase;
padding:2px 8px;
border-radius:4px;
white-space:nowrap;
}

.club-pill.oprah{background:#faf5ff;color:#7c3aed;border:1px solid #ddd6fe}
.club-pill.reese{background:#fff1f2;color:#e11d48;border:1px solid #fecdd3}

.card-title{
font-weight:700;
font-size:14px;
line-height:1.3;
}

.card-author{
font-size:12px;
color:#64748b;
}

.goodreads{
font-size:11px;
font-weight:600;
color:#b45309;
margin-top:2px;
}

.hold-badge{
font-size:11px;
font-weight:600;
padding:4px 10px;
border-radius:6px;
display:inline-flex;
gap:5px;
}

.hold-badge.holds{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
.hold-badge.available{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.hold-badge.loading{background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0}

.card-links{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:2px;
}

.card-links a{
font-size:11px;
font-weight:600;
padding:4px 10px;
border-radius:6px;
text-decoration:none;
}

.link-kcls{
background:#eff6ff;
color:#1d4ed8;
border:1px solid #bfdbfe;
}

.link-libby{
background:#f0fdf4;
color:#15803d;
border:1px solid #bbf7d0;
}

</style>
</head>

<body>

<header>
<h1>📚 Book Club Tracker × King County Library</h1>
<p>Oprah's Book Club & Reese's Book Club — eBook holds on KCLS</p>
<div id="last-updated">Loading hold data…</div>
</header>

<div class="filter-bar">

<button class="filter-btn active-all" onclick="setFilter('all')">All</button>
<button class="filter-btn" onclick="setFilter('oprah')">Oprah</button>
<button class="filter-btn" onclick="setFilter('reese')">Reese</button>
<button class="filter-btn" onclick="setFilter('2025')">2025</button>
<button class="filter-btn" onclick="setFilter('available')">Available</button>

</div>

<div id="grid"></div>

<script>

const BOOKS=[

{id:'o24-04',title:'Tell Me Everything',author:'Elizabeth Strout',club:'oprah',year:2024,rating:4.1},
{id:'o24-06',title:'Small Things Like These',author:'Claire Keegan',club:'oprah',year:2024,rating:4.3},

{id:'o25-01',title:'Dream State',author:'Eric Puchner',club:'oprah',year:2025,rating:4.0},
{id:'o25-02',title:'The Tell',author:'Amy Griffin',club:'oprah',year:2025,rating:4.0},
{id:'o25-03',title:'Matriarch',author:'Tina Knowles',club:'oprah',year:2025},

{id:'r24-01',title:'First Lie Wins',author:'Ashley Elston',club:'reese',year:2024,rating:4.0},

{id:'r25-01',title:'The Three Lives of Cate Kay',author:'Kate Fagan',club:'reese',year:2025,rating:4.0},
{id:'r25-02',title:'Isola',author:'Allegra Goodman',club:'reese',year:2025,rating:4.2},
{id:'r25-03',title:'The Tell',author:'Amy Griffin',club:'reese',year:2025,rating:4.0},
{id:'r25-04',title:'Broken Country',author:'Clare Leslie Hall',club:'reese',year:2025,rating:4.2},
{id:'r25-05',title:'Great Big Beautiful Life',author:'Emily Henry',club:'reese',year:2025,rating:4.1}

];

let HOLDS={}
let activeFilter='all'

async function loadHolds(){

try{

const resp=await fetch('./kc-holds.json?_='+Date.now())
const data=await resp.json()

HOLDS=data.books||{}

const el=document.getElementById('last-updated')

if(data.updated){

const d=new Date(data.updated)
el.textContent="Hold data updated "+d.toLocaleString()

}

render()

}catch(e){

document.getElementById('last-updated').textContent="Could not load hold data."

}

}

function holdBadge(id){

const h=HOLDS[id]

if(!h)return`<span class="hold-badge loading">Checking…</span>`

if(h.status==="holds"){

return`<span class="hold-badge holds">📋 ${h.holds} holds (${h.copies} copies)</span>`

}

if(h.status==="available"){

return`<span class="hold-badge available">✓ Available</span>`

}

return`<span class="hold-badge loading">—</span>`

}

function visibleBooks(){

return BOOKS.filter(b=>{

if(activeFilter==="all")return true
if(activeFilter==="oprah")return b.club==="oprah"
if(activeFilter==="reese")return b.club==="reese"
if(activeFilter==="2025")return b.year===2025

if(activeFilter==="available"){

const h=HOLDS[b.id]
return h&&h.available

}

return true

})

}

function render(){

const books=visibleBooks()

const grid=document.getElementById("grid")

grid.innerHTML=books.map(b=>`

<div class="card">

<div class="card-top">

<div>

<div class="card-title">${b.title}</div>

<div class="card-author">

${b.author}

${b.rating?`<div class="goodreads">⭐ ${b.rating} Goodreads</div>`:''}

</div>

</div>

<span class="club-pill ${b.club}">${b.club} ${b.year}</span>

</div>

<div>${holdBadge(b.id)}</div>

<div class="card-links">

<a class="link-kcls" href="https://kcls.bibliocommons.com/v2/search?query=${encodeURIComponent(b.title)}&searchType=keyword&f_FORMAT=EBOOK" target="_blank">KCLS</a>

<a class="link-libby" href="https://libbyapp.com/search/kcls/search/query-${encodeURIComponent(b.title)}" target="_blank">Libby</a>

</div>

</div>

`).join("")

}

function setFilter(f){

activeFilter=f

document.querySelectorAll(".filter-btn").forEach(btn=>btn.classList.remove("active-oprah","active-reese","active-all"))

event.target.classList.add("active-"+(f==="oprah"?"oprah":f==="reese"?"reese":"all"))

render()

}

render()
loadHolds()

</script>

</body>
</html>
