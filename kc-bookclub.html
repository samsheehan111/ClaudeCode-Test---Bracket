<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Book Club Tracker — Oprah &amp; Reese × King County Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #f0f4f8;
  color: #1e293b;
  margin: 0;
  padding: 0;
}

header {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 20px 24px;
  position: sticky;
  top: 0;
  z-index: 10;
}

header h1 {
  margin: 0 0 4px;
  font-size: 20px;
  font-weight: 800;
}

header p {
  margin: 0;
  font-size: 13px;
  color: #64748b;
}

#last-updated {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 4px;
}

.filter-bar {
  display: flex;
  gap: 8px;
  padding: 16px 24px 0;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #e2e8f0;
  background: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: #475569;
  transition: all 0.15s;
}

.filter-btn:hover { border-color: #94a3b8; }

.filter-btn.active-oprah  { background: #faf5ff; color: #7c3aed; border-color: #c4b5fd; }
.filter-btn.active-reese  { background: #fff1f2; color: #e11d48; border-color: #fda4af; }
.filter-btn.active-all    { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  padding: 16px 24px 32px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  border: 1px solid #f1f5f9;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}

.club-pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.club-pill.oprah { background: #faf5ff; color: #7c3aed; border: 1px solid #ddd6fe; }
.club-pill.reese { background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; }

.card-title { font-weight: 700; font-size: 14px; line-height: 1.3; }
.card-author { font-size: 12px; color: #64748b; }
.card-year   { font-size: 11px; color: #94a3b8; }

.hold-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}

.hold-badge.holds     { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
.hold-badge.available { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.hold-badge.hoopla    { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
.hold-badge.loading   { background: #f8fafc; color: #94a3b8; border: 1px solid #e2e8f0; }
.hold-badge.unknown   { background: #f8fafc; color: #94a3b8; border: 1px solid #e2e8f0; }

.card-links {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 2px;
}

.card-links a {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  text-decoration: none;
  transition: opacity 0.15s;
}

.card-links a:hover { opacity: 0.8; }

.link-kcls {
  background: #eff6ff;
  color: #1d4ed8;
  border: 1px solid #bfdbfe;
}

.link-libby {
  background: #f0fdf4;
  color: #15803d;
  border: 1px solid #bbf7d0;
}

.link-gr {
  background: #fef9f0;
  color: #b5562b;
  border: 1px solid #f5cba7;
}

.gr-rating {
  font-size: 11px;
  color: #b5562b;
  font-weight: 600;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 48px;
  color: #94a3b8;
  font-size: 14px;
}
</style>
</head>
<body>

<header>
  <h1>📚 Book Club Tracker &times; King County Library</h1>
  <p>Oprah's Book Club &amp; Reese's Book Club — eBook holds on KCLS</p>
  <div id="last-updated">Loading hold data…</div>
</header>

<div class="filter-bar">
  <button class="filter-btn active-all" data-filter="all" onclick="setFilter('all')">All Books</button>
  <button class="filter-btn" data-filter="oprah" onclick="setFilter('oprah')">Oprah's Club</button>
  <button class="filter-btn" data-filter="reese" onclick="setFilter('reese')">Reese's Club</button>
  <button class="filter-btn" data-filter="2025" onclick="setFilter('2025')">2025 Picks</button>
  <button class="filter-btn" data-filter="2024" onclick="setFilter('2024')">2024 Picks</button>
  <button class="filter-btn" data-filter="available" onclick="setFilter('available')">Available Now</button>
</div>

<div id="grid"></div>

<script>
'use strict';

const BOOKS = [
  {id:'o24-01', title:'The Many Lives of Mama Love',       author:'Lara Love Hardin',                  club:'oprah', year:2024, gr:4.4, grUrl:'https://www.goodreads.com/book/show/64631561-the-many-lives-of-mama-love'},
  {id:'o24-02', title:'Long Island',                        author:'Colm Tóibín',                       club:'oprah', year:2024, gr:3.7, grUrl:'https://www.goodreads.com/book/show/199798868-long-island'},
  {id:'o24-03', title:'Familiaris',                         author:'David Wroblewski',                  club:'oprah', year:2024, gr:4.2, grUrl:'https://www.goodreads.com/book/show/200262412-familiaris'},
  {id:'o24-04', title:'Tell Me Everything',                 author:'Elizabeth Strout',                  club:'oprah', year:2024, gr:4.2, grUrl:'https://www.goodreads.com/book/show/204811915-tell-me-everything'},
  {id:'o24-05', title:'From Here to the Great Unknown',     author:'Lisa Marie Presley & Riley Keough', club:'oprah', year:2024, gr:4.3, grUrl:'https://www.goodreads.com/book/show/204905217-from-here-to-the-great-unknown'},
  {id:'o24-06', title:'Small Things Like These',            author:'Claire Keegan',                     club:'oprah', year:2024, gr:4.1, grUrl:'https://www.goodreads.com/book/show/58662236-small-things-like-these'},
  {id:'o25-01', title:'Dream State',                        author:'Eric Puchner',                      club:'oprah', year:2025, gr:3.6, grUrl:'https://www.goodreads.com/book/show/215362651-dream-state'},
  {id:'o25-02', title:'The Tell',                           author:'Amy Griffin',                       club:'oprah', year:2025, gr:4.0, grUrl:'https://www.goodreads.com/book/show/214537759-the-tell'},
  {id:'o25-03', title:'Matriarch',                          author:'Tina Knowles',                      club:'oprah', year:2025, gr:4.5, grUrl:'https://www.goodreads.com/book/show/217044909-matriarch'},
  {id:'o25-04', title:'The Emperor of Gladness',            author:'Ocean Vuong',                       club:'oprah', year:2025, gr:3.9, grUrl:'https://www.goodreads.com/book/show/219848315-the-emperor-of-gladness'},
  {id:'o25-05', title:'The River Is Waiting',               author:'Wally Lamb',                        club:'oprah', year:2025, gr:4.3, grUrl:'https://www.goodreads.com/book/show/219319489-the-river-is-waiting'},
  {id:'o25-06', title:'Culpability',                        author:'Bruce Holsinger',                   club:'oprah', year:2025, gr:4.0, grUrl:'https://www.goodreads.com/book/show/222259253-culpability'},
  {id:'o25-07', title:"Somebody's Fool",                    author:'Richard Russo',                     club:'oprah', year:2025, gr:4.3, grUrl:'https://www.goodreads.com/book/show/62952125-somebody-s-fool'},
  {id:'o25-08', title:'A Guardian and a Thief',             author:'Megha Majumdar',                    club:'oprah', year:2025, gr:3.8, grUrl:'https://www.goodreads.com/book/show/232207672-a-guardian-and-a-thief'},
  {id:'o25-09', title:'Some Bright Nowhere',                author:'Ann Packer',                        club:'oprah', year:2025, gr:3.7, grUrl:'https://www.goodreads.com/book/show/231388884-some-bright-nowhere'},
  {id:'r24-01', title:'First Lie Wins',                     author:'Ashley Elston',                     club:'reese', year:2024, gr:4.3, grUrl:'https://www.goodreads.com/book/show/164444179-first-lie-wins'},
  {id:'r24-02', title:'City of Night Birds',                author:'Juhea Kim',                         club:'reese', year:2024, gr:2.8, grUrl:'https://www.goodreads.com/en/book/show/209801563-city-of-night-birds'},
  {id:'r24-03', title:'Redwood Court',                      author:'DéLana R.A. Dameron',               club:'reese', year:2024, gr:3.4, grUrl:'https://www.goodreads.com/en/book/show/150247430'},
  {id:'r24-04', title:'Anita de Monte Laughs Last',         author:'Xochitl Gonzalez',                  club:'reese', year:2024, gr:3.8, grUrl:'https://www.goodreads.com/book/show/127306192-anita-de-monte-laughs-last'},
  {id:'r24-05', title:'Did You Hear About Kitty Karr?',     author:'Crystal Smith Paul',                club:'reese', year:2024, gr:3.7, grUrl:'https://www.goodreads.com/book/show/61796683-did-you-hear-about-kitty-karr'},
  {id:'r24-06', title:'The Unwedding',                      author:'Ally Condie',                       club:'reese', year:2024, gr:3.2, grUrl:'https://www.goodreads.com/book/show/199262864-the-unwedding'},
  {id:'r24-07', title:'The Cliffs',                         author:'J. Courtney Sullivan',              club:'reese', year:2024, gr:3.6, grUrl:'https://www.goodreads.com/book/show/200634908-the-cliffs'},
  {id:'r24-08', title:'Slow Dance',                         author:'Rainbow Rowell',                    club:'reese', year:2024, gr:3.7, grUrl:'https://www.goodreads.com/book/show/198530925-slow-dance'},
  {id:'r24-09', title:'The Comfort of Crows',               author:'Margaret Renkl',                    club:'reese', year:2024, gr:4.2, grUrl:'https://www.goodreads.com/book/show/123087784-the-comfort-of-crows'},
  {id:'r24-10', title:'Society of Lies',                    author:'Lauren Ling Brown',                 club:'reese', year:2024, gr:3.5, grUrl:'https://www.goodreads.com/book/show/202102003-society-of-lies'},
  {id:'r24-11', title:'We Will Be Jaguars',                 author:'Nemonte Nenquimo & Mitch Anderson',  club:'reese', year:2024, gr:4.5, grUrl:'https://www.goodreads.com/book/show/195660519-we-will-be-jaguars'},
  {id:'r25-01', title:'The Three Lives of Cate Kay',        author:'Kate Fagan',                        club:'reese', year:2025, gr:3.7, grUrl:'https://www.goodreads.com/book/show/214152244-the-three-lives-of-cate-kay'},
  {id:'r25-02', title:'Isola',                              author:'Allegra Goodman',                   club:'reese', year:2025, gr:4.0, grUrl:'https://www.goodreads.com/book/show/212806636-isola'},
  {id:'r25-03', title:'The Tell',                           author:'Amy Griffin',                       club:'reese', year:2025, gr:4.0, grUrl:'https://www.goodreads.com/book/show/214537759-the-tell'},
  {id:'r25-04', title:'Broken Country',                     author:'Clare Leslie Hall',                 club:'reese', year:2025, gr:4.3, grUrl:'https://www.goodreads.com/book/show/214151202-broken-country'},
  {id:'r25-05', title:'Great Big Beautiful Life',           author:'Emily Henry',                       club:'reese', year:2025, gr:3.9, grUrl:'https://www.goodreads.com/book/show/218559595-great-big-beautiful-life'},
  {id:'r25-06', title:'The Phoenix Pencil Company',         author:'Allison King',                      club:'reese', year:2025, gr:3.6, grUrl:'https://www.goodreads.com/book/show/220652184-the-phoenix-pencil-company'},
  {id:'r25-07', title:'Spectacular Things',                 author:'Beck Dorey-Stein',                  club:'reese', year:2025, gr:4.1, grUrl:'https://www.goodreads.com/book/show/221251808-spectacular-things'},
  {id:'r25-08', title:'Once Upon a Time in Dollywood',      author:'Ashley Jordan',                     club:'reese', year:2025, gr:4.3, grUrl:'https://www.goodreads.com/book/show/223854466-once-upon-a-time-in-dollywood'},
  {id:'r25-09', title:'The Heir Apparent',                  author:'Rebecca Armitage',                  club:'reese', year:2025, gr:3.9, grUrl:'https://www.goodreads.com/book/show/232885690-the-heir-apparent'},
];

let HOLDS = {};
let activeFilter = 'all';

async function loadHolds() {
  try {
    const resp = await fetch('./kc-holds.json?_=' + Date.now());
    if (!resp.ok) throw new Error('Cannot fetch kc-holds.json');
    const data = await resp.json();
    HOLDS = data.books || {};
    const el = document.getElementById('last-updated');
    if (data.updated && data.updated !== '1970-01-01T00:00:00Z') {
      const d = new Date(data.updated);
      el.textContent = 'Hold data last updated: ' + d.toLocaleString();
    } else {
      el.textContent = 'Hold data not yet fetched — runs automatically every 12 hours via GitHub Actions.';
    }
    renderCards();
  } catch(e) {
    document.getElementById('last-updated').textContent = 'Could not load hold data.';
    console.warn(e);
  }
}

function holdBadge(id) {
  const h = HOLDS[id];
  if (!h) return `<span class="hold-badge loading">Checking KCLS…</span>`;

  if (h.status === 'holds') {
    const copies = h.copies === 1 ? '1 copy' : `${h.copies} copies`;
    return `<span class="hold-badge holds">📋 ${h.holds} holds for ${copies}</span>`;
  }
  if (h.status === 'available') {
    if (h.holds > 0) {
      const copies = h.copies === 1 ? '1 copy' : `${h.copies} copies`;
      return `<span class="hold-badge available">✓ Available now &mdash; ${h.holds} holds, ${copies}</span>`;
    }
    return `<span class="hold-badge available">✓ Available now &mdash; no holds!</span>`;
  }
  if (h.status === 'hoopla') return `<span class="hold-badge hoopla">∞ Available on Hoopla (unlimited)</span>`;
  return `<span class="hold-badge unknown">—</span>`;
}

function kclsUrl(book) {
  const q = encodeURIComponent(book.title + ' ' + book.author);
  return `https://kcls.bibliocommons.com/v2/search?query=${encodeURIComponent(book.title)}&searchType=keyword&f_FORMAT=EBOOK`;
}

function libbyUrl(book) {
  return `https://libbyapp.com/search/kcls/search/query-${encodeURIComponent(book.title)}/page-1`;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.className = 'filter-btn';
    if (btn.dataset.filter === f) {
      btn.classList.add('active-' + (f === 'all' ? 'all' : f === 'oprah' ? 'oprah' : f === 'reese' ? 'reese' : 'all'));
    }
  });
  renderCards();
}

function visibleBooks() {
  return BOOKS.filter(b => {
    if (activeFilter === 'all')       return true;
    if (activeFilter === 'oprah')     return b.club === 'oprah';
    if (activeFilter === 'reese')     return b.club === 'reese';
    if (activeFilter === '2024')      return b.year === 2024;
    if (activeFilter === '2025')      return b.year === 2025;
    if (activeFilter === 'available') {
      const h = HOLDS[b.id];
      return h && h.available === true;
    }
    return true;
  });
}

function renderCards() {
  const books = visibleBooks();
  const grid = document.getElementById('grid');
  if (!books.length) {
    grid.innerHTML = '<div class="empty-state">No books match this filter.</div>';
    return;
  }
  grid.innerHTML = books.map(b => `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-title">${escHtml(b.title)}</div>
          <div class="card-author">${escHtml(b.author)}</div>
        </div>
        <span class="club-pill ${b.club}">${b.club === 'oprah' ? "Oprah's" : "Reese's"} ${b.year}</span>
      </div>
      <div>${holdBadge(b.id)}</div>
      <div class="card-links">
        <a class="link-kcls"  href="${kclsUrl(b)}"  target="_blank" rel="noopener">KCLS Catalog</a>
        <a class="link-libby" href="${libbyUrl(b)}" target="_blank" rel="noopener">Libby / OverDrive</a>
        <a class="link-gr"    href="${escHtml(b.grUrl)}" target="_blank" rel="noopener">⭐ ${b.gr} Goodreads</a>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderCards();
loadHolds();
</script>
</body>
</html>
