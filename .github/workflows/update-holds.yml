name: Update SFPL Hold Counts

on:
  schedule:
    # Runs at 8am and 8pm UTC (midnight and noon Pacific)
    - cron: "0 8,20 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

jobs:
  update-holds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch hold counts from SFPL
        run: python scripts/fetch_holds.py

      - name: Commit holds.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add holds.json
          git diff --cached --quiet || git commit -m "chore: update SFPL hold counts [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
