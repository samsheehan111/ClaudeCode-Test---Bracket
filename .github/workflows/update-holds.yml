name: Update SFPL Holds

on:
  workflow_dispatch: # manual only — holds removed from bookclub.html

jobs:
  update-holds:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3 cheerio

      - name: Run scraper
        run: node update-holds.js

      - name: Commit and push holds.json
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add holds.json
          git commit -m "Update holds.json" || echo "No changes"
          git push
