<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2025–2026 TV Releases — What to Watch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    input[type="range"] { accent-color: #22d3ee; }
    input[type="checkbox"] { accent-color: #22d3ee; }
    select option { background: #1f2937; }
    .card { transition: transform 0.22s ease, box-shadow 0.22s ease; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 28px 56px rgba(0,0,0,0.65); }
    #emptyState { display: none; }
    @keyframes shimmer { 0%,100% { opacity:.35 } 50% { opacity:.7 } }
    .skeleton { animation: shimmer 1.6s ease-in-out infinite; }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="sticky top-0 z-50 bg-gray-950/90 backdrop-blur-md border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex flex-wrap items-center justify-between gap-3">
      <div>
        <h1 class="text-xl sm:text-2xl font-extrabold tracking-tight text-white">
          📺 <span class="text-cyan-400">2026 TV Releases</span>
        </h1>
        <p class="text-xs text-gray-500 mt-0.5">Jan 2025 – Mar 2026 · Top 100 by Rating</p>
      </div>
      <span id="countLabel"
        class="text-xs sm:text-sm font-semibold bg-cyan-950/60 text-cyan-300 px-3 py-1.5 rounded-full border border-cyan-800/50">
        Loading…
      </span>
    </div>
  </header>

  <!-- ── Filters ────────────────────────────────────────────────────────── -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4">
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4">
      <div class="flex flex-wrap gap-4 items-end">

        <!-- Search -->
        <div class="flex-1 min-w-[180px]">
          <label class="block text-xs text-gray-500 mb-1.5 font-semibold uppercase tracking-wider">Search</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm select-none">🔍</span>
            <input type="text" id="searchInput" placeholder="Search shows…"
              class="w-full bg-gray-800 border border-gray-700 rounded-xl pl-8 pr-3 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/30 transition-all">
          </div>
        </div>

        <!-- Month -->
        <div class="min-w-[140px]">
          <label class="block text-xs text-gray-500 mb-1.5 font-semibold uppercase tracking-wider">Month</label>
          <select id="monthFilter"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-cyan-500 transition-all">
            <option value="all">All Months</option>
            <option value="2025" disabled style="color:#4b5563;font-weight:700">── 2025 ──</option>
            <option value="2025-01">Jan 2025</option>
            <option value="2025-02">Feb 2025</option>
            <option value="2025-03">Mar 2025</option>
            <option value="2025-04">Apr 2025</option>
            <option value="2025-05">May 2025</option>
            <option value="2025-06">Jun 2025</option>
            <option value="2025-07">Jul 2025</option>
            <option value="2025-08">Aug 2025</option>
            <option value="2025-09">Sep 2025</option>
            <option value="2025-10">Oct 2025</option>
            <option value="2025-11">Nov 2025</option>
            <option value="2025-12">Dec 2025</option>
            <option value="2026" disabled style="color:#4b5563;font-weight:700">── 2026 ──</option>
            <option value="2026-01">Jan 2026</option>
            <option value="2026-02">Feb 2026</option>
            <option value="2026-03">Mar 2026</option>
          </select>
        </div>

        <!-- Platform -->
        <div class="min-w-[160px]">
          <label class="block text-xs text-gray-500 mb-1.5 font-semibold uppercase tracking-wider">Platform</label>
          <select id="platformFilter"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-gray-100 focus:outline-none focus:border-cyan-500 transition-all">
            <option value="all">All Platforms</option>
          </select>
        </div>

        <!-- Min Rating -->
        <div class="min-w-[160px]">
          <label class="block text-xs text-gray-500 mb-1.5 font-semibold uppercase tracking-wider">
            Min Rating: <span id="ratingValue" class="text-yellow-400 font-bold">0</span>
          </label>
          <input type="range" id="ratingFilter" min="0" max="9" value="0" step="0.5" class="w-full">
        </div>

        <!-- Rated Only -->
        <label class="flex items-center gap-2.5 cursor-pointer select-none pb-0.5 min-w-fit">
          <input type="checkbox" id="qualityFilter" class="w-4 h-4 rounded cursor-pointer">
          <div>
            <p class="text-sm text-gray-300 font-medium leading-none">Rated Shows Only</p>
            <p class="text-xs text-gray-600 mt-0.5">Has an IMDb rating</p>
          </div>
        </label>

      </div>

      <!-- Status bar -->
      <div class="flex justify-between items-center mt-3 pt-3 border-t border-gray-800">
        <span id="statusLabel" class="text-xs text-gray-600">Fetching shows…</span>
        <button id="resetBtn" class="text-xs text-cyan-500 hover:text-cyan-300 transition-colors font-medium">
          ↺ Reset filters
        </button>
      </div>
    </div>
  </div>

  <!-- ── Cards ──────────────────────────────────────────────────────────── -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 pb-16">

    <!-- Skeleton loader -->
    <div id="skeletonGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

    <!-- Live cards -->
    <div id="cardGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

    <!-- Empty state -->
    <div id="emptyState" class="flex-col items-center justify-center py-24 text-center">
      <div class="text-6xl mb-4 opacity-40">📭</div>
      <p class="text-gray-400 text-lg font-semibold">No shows match your filters</p>
      <p class="text-gray-600 text-sm mt-1">Try adjusting or resetting your filters</p>
      <button onclick="resetFilters()"
        class="mt-5 px-5 py-2 bg-cyan-900/50 text-cyan-400 border border-cyan-800 rounded-xl text-sm hover:bg-cyan-900 transition-colors font-medium">
        Clear Filters
      </button>
    </div>

  </main>

  <footer class="border-t border-gray-800/50 py-8 text-center text-xs text-gray-700">
    Ratings sourced from TMDB · IMDb via OMDb API
  </footer>

  <script>
    // ── Config ───────────────────────────────────────────────────────────────
    const API_KEY    = '21322bdf6abf288ae15aa6a97caf66ae';
    const OMDB_KEY   = '679ba5a1';
    const TMDB       = 'https://api.themoviedb.org/3';
    const OMDB       = 'https://www.omdbapi.com';
    const IMG_SM     = 'https://image.tmdb.org/t/p/w342';   // card poster

    // ── Known streaming providers (US IDs → style) ──────────────────────────
    const PROVIDERS = {
      8:    { name: 'Netflix',       g1: '#1a0000', g2: '#3b0000', text: '#ff6b6b', border: '#7f0000', bg: '#5c000055' },
      9:    { name: 'Prime Video',   g1: '#001929', g2: '#003060', text: '#6bc5ff', border: '#0060b0', bg: '#003a7a44' },
      337:  { name: 'Disney+',       g1: '#000826', g2: '#001460', text: '#5599ff', border: '#003da6', bg: '#00226644' },
      15:   { name: 'Hulu',          g1: '#002818', g2: '#004228', text: '#1ce783', border: '#008844', bg: '#004d2e44' },
      1899: { name: 'Max',           g1: '#000830', g2: '#001165', text: '#7aabff', border: '#0030bb', bg: '#001a7a44' },
      2552: { name: 'Apple TV+',     g1: '#0c0c0c', g2: '#1a1a1c', text: '#d1d5db', border: '#3a3a3c', bg: '#1a1a1a66' },
      386:  { name: 'Peacock',       g1: '#280f00', g2: '#501f00', text: '#ff9933', border: '#884400', bg: '#4d200044' },
      531:  { name: 'Paramount+',    g1: '#000018', g2: '#000030', text: '#8888ff', border: '#2222aa', bg: '#00003344' },
      43:   { name: 'Starz',         g1: '#0c0018', g2: '#1a0030', text: '#cc99ff', border: '#6633aa', bg: '#33006644' },
      35:   { name: 'HBO',           g1: '#180018', g2: '#2c003e', text: '#dd55ff', border: '#7700cc', bg: '#44006644' },
      37:   { name: 'Showtime',      g1: '#2a0000', g2: '#550000', text: '#ff4444', border: '#990000', bg: '#66000044' },
      175:  { name: 'Netflix',       g1: '#1a0000', g2: '#3b0000', text: '#ff6b6b', border: '#7f0000', bg: '#5c000055' }, // Netflix Kids alias
      283:  { name: 'Crunchyroll',   g1: '#2b0d00', g2: '#4a1800', text: '#ff6a00', border: '#aa3300', bg: '#4d1a0044' },
      73:   { name: 'AMC+',          g1: '#001a1a', g2: '#003535', text: '#00cccc', border: '#006666', bg: '#00444444' },
    };

    const DEFAULT_STYLE = { g1: '#111827', g2: '#1f2937', text: '#9ca3af', border: '#374151', bg: '#1f293766' };

    // ── Major streaming platforms (only these are shown) ─────────────────────
    const MAJOR_IDS = new Set([8, 175, 15, 1899, 9, 386, 531, 2552]);
    // 8/175=Netflix, 15=Hulu, 1899=Max, 9=Prime Video, 386=Peacock, 531=Paramount+, 2552=Apple TV+

    // ── State ────────────────────────────────────────────────────────────────
    let allShows = [];  // enriched show objects

    // ── API fetch helpers ────────────────────────────────────────────────────
    async function tmdb(path) {
      const sep = path.includes('?') ? '&' : '?';
      const res = await fetch(`${TMDB}${path}${sep}api_key=${API_KEY}`);
      if (!res.ok) throw new Error(`API ${res.status}: ${path}`);
      return res.json();
    }

    // ── Main data fetch ──────────────────────────────────────────────────────
    async function fetchShows() {
      showSkeletons(8);
      setStatus('Fetching 2026 shows…');

      try {
        // Phase 1 — Discover US shows Jan 2025–now, sorted by popularity
        const today = new Date().toISOString().slice(0, 10);
        const base = '/discover/tv?with_origin_country=US&with_original_language=en' +
                     `&first_air_date.gte=2025-01-01&first_air_date.lte=${today}&sort_by=popularity.desc`;
        const pages = await Promise.all([
          tmdb(`${base}&page=1`),
          tmdb(`${base}&page=2`),
          tmdb(`${base}&page=3`),
          tmdb(`${base}&page=4`),
          tmdb(`${base}&page=5`),
          tmdb(`${base}&page=6`),
        ]);

        const raw = pages
          .flatMap(p => p.results || [])
          .filter(s => s.first_air_date && s.first_air_date >= '2025-01-01' && s.first_air_date <= today);

        const seen = new Set();
        allShows = raw.filter(s => { if (seen.has(s.id)) return false; seen.add(s.id); return true; });

        // Pre-populate TMDB rating as fallback (available immediately from discover API)
        allShows.forEach(s => {
          s._tmdbRating = (s.vote_average && s.vote_count > 5) ? s.vote_average : null;
        });

        hideSkeletons();
        render();
        setStatus(`Loading streaming info & IMDb IDs for ${allShows.length} shows…`);

        // Phase 2 — Providers + external IDs in parallel (one Promise.all round)
        const [providerData, externalData] = await Promise.all([
          Promise.allSettled(allShows.map(s =>
            tmdb(`/tv/${s.id}/watch/providers`)
              .then(d => ({ id: s.id, flatrate: d.results?.US?.flatrate || [] }))
              .catch(() => ({ id: s.id, flatrate: [] }))
          )),
          Promise.allSettled(allShows.map(s =>
            tmdb(`/tv/${s.id}/external_ids`)
              .then(d => ({ id: s.id, imdbId: d.imdb_id || null }))
              .catch(() => ({ id: s.id, imdbId: null }))
          )),
        ]);

        providerData.forEach(r => {
          if (r.status === 'fulfilled') {
            const show = allShows.find(s => s.id === r.value.id);
            if (show) show._providers = r.value.flatrate;
          }
        });
        externalData.forEach(r => {
          if (r.status === 'fulfilled') {
            const show = allShows.find(s => s.id === r.value.id);
            if (show) show._imdbId = r.value.imdbId;
          }
        });

        // Keep only shows on major streaming platforms
        allShows = allShows.filter(s =>
          (s._providers || []).some(p => MAJOR_IDS.has(p.provider_id))
        );

        buildPlatformFilter();
        render();

        // Phase 3 — OMDb for real IMDb ratings (only shows that have an IMDb ID)
        const withImdb = allShows.filter(s => s._imdbId);
        setStatus(`Fetching IMDb ratings for ${withImdb.length} shows…`);

        const omdbData = await Promise.allSettled(
          withImdb.map(s =>
            fetch(`${OMDB}/?i=${s._imdbId}&apikey=${OMDB_KEY}`)
              .then(r => r.json())
              .then(d => ({
                id:         s.id,
                imdbRating: d.imdbRating && d.imdbRating !== 'N/A' ? parseFloat(d.imdbRating) : null,
                imdbVotes:  d.imdbVotes  && d.imdbVotes  !== 'N/A' ? parseInt(d.imdbVotes.replace(/,/g, '')) : 0,
                rtScore:    (d.Ratings || []).find(r => r.Source === 'Rotten Tomatoes')?.Value ?? null,
              }))
              .catch(() => ({ id: s.id, imdbRating: null, imdbVotes: 0 }))
          )
        );

        omdbData.forEach(r => {
          if (r.status === 'fulfilled') {
            const show = allShows.find(s => s.id === r.value.id);
            if (show) { show._imdbRating = r.value.imdbRating; show._rtScore = r.value.rtScore; }
          }
        });

        // Sort: IMDb first, then TMDB rating, then popularity
        allShows = allShows
          .sort((a, b) => {
            const ra = a._imdbRating ?? a._tmdbRating ?? 0;
            const rb = b._imdbRating ?? b._tmdbRating ?? 0;
            if (ra && rb) return rb - ra;
            if (ra) return -1;
            if (rb) return 1;
            return b.popularity - a.popularity;
          })
          .slice(0, 100);

        buildPlatformFilter();
        render();
        const rated = allShows.filter(s => s._imdbRating != null).length;
        setStatus(`${allShows.length} shows on major streamers · ${rated} with IMDb ratings`);

      } catch (err) {
        hideSkeletons();
        setStatus(`⚠ Error: ${err.message}`);
        console.error(err);
      }
    }

    // ── Platform filter dropdown ──────────────────────────────────────────────
    function buildPlatformFilter() {
      const sel = document.getElementById('platformFilter');
      const prev = sel.value;
      sel.innerHTML = '<option value="all">All Platforms</option>';

      const names = new Set();
      allShows.forEach(s =>
        (s._providers || []).forEach(p => {
          if (PROVIDERS[p.provider_id]) names.add(PROVIDERS[p.provider_id].name);
        })
      );

      [...names].sort().forEach(name => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = name;
        sel.appendChild(opt);
      });

      sel.value = names.has(prev) ? prev : 'all';
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function getStyle(providers) {
      for (const p of (providers || [])) {
        if (PROVIDERS[p.provider_id]) return PROVIDERS[p.provider_id];
      }
      return DEFAULT_STYLE;
    }

    function scoreBar(pct, color) {
      const w = Math.min(100, Math.max(0, Math.round(pct)));
      return `<div style="height:4px;background:#374151;border-radius:9999px;overflow:hidden;margin-top:3px">
        <div style="height:100%;width:${w}%;background:${color};border-radius:9999px;transition:width .4s ease"></div>
      </div>`;
    }

    function stars(rating) {
      const n = Math.round(rating / 2);
      return Array.from({ length: 5 }, (_, i) =>
        `<span style="font-size:13px;color:${i < n ? '#fbbf24' : '#374151'}">★</span>`
      ).join('');
    }

    function fmtDate(d) {
      if (!d) return '—';
      const [, m, day] = d.split('-');
      return `${['', 'Jan', 'Feb'][+m] || '?'} ${+day}, 2026`;
    }

    // ── Card builder ──────────────────────────────────────────────────────────
    function buildCard(show, rank) {
      const providers = show._providers || [];
      const style = getStyle(providers);

      // Provider badges (max 3)
      const rating10  = show._imdbRating ?? show._tmdbRating ?? 0;
      const ratingSource = show._imdbRating != null ? 'IMDb' : 'TMDB';
      const popularity100 = Math.min(100, Math.round(show.popularity));

      // RT score from OMDb
      const rtRaw  = show._rtScore;
      const rtNum  = rtRaw ? parseInt(rtRaw) : null;
      const rtColor = rtNum == null ? '#6b7280'
                    : rtNum >= 80   ? '#4ade80'
                    : rtNum >= 60   ? '#fb923c'
                                    : '#f87171';

      const knownProviders = providers.filter(p => PROVIDERS[p.provider_id]);
      const badgesHtml = knownProviders.slice(0, 3).map(p => {
        const s = PROVIDERS[p.provider_id];
        return `<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:9999px;
          background:${s.bg};border:1px solid ${s.border};color:${s.text};white-space:nowrap">${s.name}</span>`;
      }).join('') || `<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:9999px;
        background:#1f293766;border:1px solid #374151;color:#9ca3af">Streaming TBD</span>`;

      const topBadge = rating10 >= 8.0
        ? `<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:9999px;
            background:#15803d55;border:1px solid #166534;color:#4ade80;white-space:nowrap">✓ Top Pick</span>`
        : '';

      // Poster image or gradient fallback
      const posterHtml = show.poster_path
        ? `<img src="${IMG_SM}${show.poster_path}" alt="${show.name.replace(/"/g, '&quot;')}" loading="lazy"
             style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"
             onerror="this.style.display='none'">`
        : `<span style="font-size:72px;font-weight:900;color:${style.text}1a;user-select:none;line-height:1">${show.name[0]}</span>`;

      return `
      <div class="card" style="
        border:1px solid ${style.border}55;border-radius:18px;overflow:hidden;
        display:flex;flex-direction:column;cursor:default;
        background:linear-gradient(160deg,${style.g1},${style.g2})">

        <!-- Poster -->
        <div style="position:relative;height:230px;overflow:hidden;
          background:linear-gradient(135deg,${style.g1},${style.g2}bb);
          display:flex;align-items:center;justify-content:center">
          ${posterHtml}
          <!-- dark overlay for text legibility -->
          <div style="position:absolute;inset:0;background:linear-gradient(to bottom,
            rgba(0,0,0,.35) 0%,transparent 45%,rgba(0,0,0,.75) 100%)"></div>
          <!-- Rank -->
          <div style="position:absolute;top:10px;left:12px;
            background:rgba(0,0,0,.7);backdrop-filter:blur(6px);border-radius:8px;
            padding:3px 10px;font-size:12px;font-weight:700;color:#fff;
            border:1px solid rgba(255,255,255,.15)">#${rank}</div>
          <!-- Score (hidden when no rating) -->
          ${rating10 > 0 ? `<div style="position:absolute;top:10px;right:12px;
            background:rgba(0,0,0,.7);backdrop-filter:blur(6px);border-radius:8px;
            padding:3px 10px;font-size:12px;font-weight:700;color:#f5c518;
            border:1px solid rgba(245,197,24,.3)">
            ⭐ ${rating10.toFixed(1)}
          </div>` : ''}
          <!-- Platform + quality badges -->
          <div style="position:absolute;bottom:10px;left:10px;right:10px;
            display:flex;flex-wrap:wrap;gap:4px;align-items:center">
            ${badgesHtml}${topBadge}
          </div>
        </div>

        <!-- Body -->
        <div style="flex:1;padding:14px;display:flex;flex-direction:column;gap:10px;
          background:rgba(0,0,0,.25)">

          <div>
            <h3 style="font-size:15px;font-weight:700;color:#f9fafb;margin:0 0 3px;line-height:1.3;
              display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
              ${show.name}
            </h3>
            <p style="font-size:11px;color:#6b7280;margin:0">${fmtDate(show.first_air_date)}</p>
          </div>

          <!-- Ratings block: IMDb left · RT right -->
          <div style="display:grid;grid-template-columns:1fr 1px 1fr;gap:0;
            background:rgba(0,0,0,.3);border:1px solid #374151;border-radius:10px;overflow:hidden">

            <!-- IMDb -->
            <div style="padding:10px 12px">
              <div style="display:flex;align-items:baseline;gap:4px;margin-bottom:3px">
                <span style="font-size:22px;font-weight:800;color:#f5c518;line-height:1">
                  ${rating10 > 0 ? rating10.toFixed(1) : '—'}
                </span>
                <span style="font-size:10px;color:#6b7280;font-weight:600">/10</span>
                <span style="margin-left:auto;font-size:9px;font-weight:700;padding:1px 5px;
                  border-radius:3px;background:#1a120088;color:#f5c518;
                  border:1px solid #f5c51844">${ratingSource}</span>
              </div>
              <div style="font-size:12px">${stars(rating10)}</div>
            </div>

            <!-- Divider -->
            <div style="background:#374151"></div>

            <!-- RT -->
            <div style="padding:10px 12px;text-align:center;display:flex;flex-direction:column;
              justify-content:center;gap:2px">
              <div style="font-size:20px;font-weight:800;color:${rtColor};line-height:1.1">
                ${rtNum != null ? rtNum + '%' : '—'}
              </div>
              <div style="font-size:9px;color:#6b7280;font-weight:600;letter-spacing:.04em;line-height:1.3">
                🍅 ROTTEN TOMATOES
              </div>
            </div>

          </div>

          <!-- Popularity bar -->
          <div>
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
              <span style="color:#9ca3af">🔥 Popularity Rank</span>
              <span style="color:#22d3ee;font-weight:700">#${rank}</span>
            </div>
            ${scoreBar(popularity100, '#22d3ee')}
          </div>
        </div>
      </div>`;
    }

    // ── Skeleton loader ───────────────────────────────────────────────────────
    function showSkeletons(n) {
      document.getElementById('skeletonGrid').innerHTML = Array.from({ length: n }, () => `
        <div class="skeleton" style="border-radius:18px;overflow:hidden;border:1px solid #374151">
          <div style="height:230px;background:#1f2937"></div>
          <div style="padding:14px;background:#111827;display:flex;flex-direction:column;gap:10px">
            <div style="height:16px;background:#374151;border-radius:6px;width:80%"></div>
            <div style="height:12px;background:#374151;border-radius:6px;width:45%"></div>
            <div style="height:4px;background:#374151;border-radius:9999px"></div>
            <div style="height:4px;background:#374151;border-radius:9999px"></div>
            <div style="height:4px;background:#374151;border-radius:9999px"></div>
          </div>
        </div>`).join('');
    }
    function hideSkeletons() { document.getElementById('skeletonGrid').innerHTML = ''; }
    function setStatus(msg)   { document.getElementById('statusLabel').textContent = msg; }

    // ── Main render ───────────────────────────────────────────────────────────
    function render() {
      const search   = document.getElementById('searchInput').value.toLowerCase().trim();
      const month    = document.getElementById('monthFilter').value;
      const platform = document.getElementById('platformFilter').value;
      const minRat   = +document.getElementById('ratingFilter').value;
      const voted    = document.getElementById('qualityFilter').checked;

      document.getElementById('ratingValue').textContent = minRat.toFixed(1);

      const filtered = allShows
        .filter(s => month === 'all' || (s.first_air_date || '').slice(0, 7) === month)
        .filter(s => {
          if (platform === 'all') return true;
          return (s._providers || []).some(p => {
            const known = PROVIDERS[p.provider_id];
            return (known ? known.name : p.provider_name) === platform;
          });
        })
        .filter(s => (s._imdbRating ?? s._tmdbRating ?? 0) >= minRat)
        .filter(s => !voted || (s._imdbRating ?? s._tmdbRating) != null)
        .filter(s => !search || s.name.toLowerCase().includes(search))
        .sort((a, b) => {
          const ra = a._imdbRating ?? a._tmdbRating ?? 0;
          const rb = b._imdbRating ?? b._tmdbRating ?? 0;
          if (ra && rb) return rb - ra;
          if (ra) return -1;
          if (rb) return 1;
          return b.popularity - a.popularity;
        });

      const grid  = document.getElementById('cardGrid');
      const empty = document.getElementById('emptyState');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.cssText = 'display:flex;flex-direction:column;align-items:center';
      } else {
        empty.style.display = 'none';
        grid.innerHTML = filtered.map((s, i) => buildCard(s, i + 1)).join('');
      }

      document.getElementById('countLabel').textContent =
        `${filtered.length} show${filtered.length !== 1 ? 's' : ''}`;
    }

    function resetFilters() {
      document.getElementById('searchInput').value    = '';
      document.getElementById('monthFilter').value    = 'all';
      document.getElementById('platformFilter').value = 'all';
      document.getElementById('ratingFilter').value   = 0;
      document.getElementById('qualityFilter').checked = false;
      render();
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    fetchShows();

    ['searchInput', 'monthFilter', 'platformFilter', 'ratingFilter', 'qualityFilter']
      .forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', render);
        el.addEventListener('change', render);
      });

    document.getElementById('resetBtn').addEventListener('click', resetFilters);
  </script>

</body>
</html>
