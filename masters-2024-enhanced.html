<html lang="en">
<head>

    <style>

            right: 0;
            height: 64px;

            align-items: center;
            justify-content: space-between;

        .header-subtitle {

        }

        .header-player {

        .player-name {
            font-family: 'Playfair Display', serif;

        .player-score {

            color: var(--masters-dark);

            font-weight: 700;

        .round-selector {

        .round-btn {

            border: 1px solid rgba(255,255,255,0.2);

            font-weight: 500;

            font-family: 'Inter', sans-serif;

        .round-btn:hover {

        }

        .round-btn.active {

            border-right: 1px solid rgba(255,255,255,0.08);

        .leaderboard-title {
            font-family: 'Playfair Display', serif;

            padding: 12px 16px;
            text-transform: uppercase;

        .leaderboard-player {

            cursor: pointer;
            transition: all 0.2s;

            left: 300px;
            background: rgba(26, 46, 78, 0.95);

            border: 1px solid rgba(200, 169, 81, 0.3);
            border-radius: 8px;

            border-radius: 2px;

            border: 1px solid rgba(200, 169, 81, 0.2);

            margin-bottom: 12px;

            flex: 1;
            padding: 10px;
            border-radius: 6px;

            font-weight: 600;

        .export-btn.copy {

            color: var(--masters-dark);

        .export-btn.close {
            background: rgba(255,255,255,0.1);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.2);

        .leaderboard::-webkit-scrollbar-thumb,
        .commentary::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    </style>
</head>

<script>
// ============================================================

const SCHEFFLER_SCORES = {

    2: [4, 5, 4, 3, 4, 3, 4, 4, 4,  4, 4, 3, 5, 4, 5, 3, 4, 5],  // 72

// Round 4 leaderboard data (starting scores after R3: Scheffler -7)
const LEADERBOARD_R4_START = [
    { name: "Scottie Scheffler", pos: 1, score: -7 },
    { name: "Ludvig Åberg", pos: 2, score: -6 },
    { name: "Max Homa", pos: 3, score: -3 },
    { name: "Tommy Fleetwood", pos: 4, score: -4 },
    { name: "Collin Morikawa", pos: 5, score: -3 },
    { name: "Cam Smith", pos: 6, score: -2 },
    { name: "Bryson DeChambeau", pos: 7, score: -2 },
];

// R4 final scores
const LEADERBOARD_R4_FINAL = [
    { name: "Scottie Scheffler", pos: 1, score: -11 },
    { name: "Ludvig Åberg", pos: 2, score: -7 },
    { name: "Max Homa", pos: 3, score: -4 },
    { name: "Tommy Fleetwood", pos: 4, score: -4 },
    { name: "Collin Morikawa", pos: 5, score: -4 },
    { name: "Cam Smith", pos: 6, score: -2 },
    { name: "Bryson DeChambeau", pos: 7, score: -2 },
];

// Commentary triggers for key moments
const COMMENTARY_MOMENTS = {
    3: "🎯 <span class=\"commentary-hole\">Hole 3:</span> Birdie! Scheffler goes to +2 lead.",
    4: "⚠️ <span class=\"commentary-hole\">Hole 4:</span> Bogey. Tee shot flies green, missed par save.",
    7: "🌳 <span class=\"commentary-hole\">Hole 7:</span> Bogey. Bunker trouble, two-putt.",
    8: "✨ <span class=\"commentary-hole\">Hole 8:</span> BIRDIE! The turnaround begins.",
    9: "🏌️ <span class=\"commentary-hole\">Hole 9:</span> BIRDIE! Approach to 1 inch. Three in a row incoming.",
    10: "🔥 <span class=\"commentary-hole\">Hole 10:</span> BIRDIE! Drained 9-footer. THREE STRAIGHT!",
    11: "📉 <span class=\"commentary-hole\">Hole 11:</span> Bogey. Missed 10-foot par save.",
    13: "💪 <span class=\"commentary-hole\">Hole 13:</span> BIRDIE! Two-putt on par 5.",
    14: "⛳ <span class=\"commentary-hole\">Hole 14:</span> BIRDIE! Approach to 4 feet. Tap-in.",
    15: "🎪 <span class=\"commentary-hole\">Hole 15:</span> Par. Playing it safe.",
    16: "🏆 <span class=\"commentary-hole\">Hole 16:</span> BIRDIE! Drained 9-footer. THE CLINCHER!",
    17: "✅ <span class=\"commentary-hole\">Hole 17:</span> Par. Cruising to victory.",
    18: "🥇 <span class=\"commentary-hole\">Hole 18:</span> Par. SECOND GREEN JACKET! -11, 4-shot victory!"
};

// ============================================================
// STATE
// ============================================================
let scene, camera, renderer, controls;
let currentRound = 'all';
let isAnimating = false;
let animationHole = 0;
let commentaryVisible = true;

// ============================================================
// THREE.JS INITIALIZATION
// ============================================================
function initThreeJS() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1428);
    scene.fog = new THREE.Fog(0x0a1428, 600, 1000);

    const canvas = document.getElementById('canvas');
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 2000);
    camera.position.set(0, 180, 250);

    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(w, h);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowShadowMap;

    controls = new OrbitControls(camera, renderer.domElement);
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 100;
    controls.maxDistance = 500;

    // Enhanced lighting
    const skyLight = new THREE.HemisphereLight(0x87ceeb, 0x1a5a2d, 1.3);
    scene.add(skyLight);

    const sunLight = new THREE.DirectionalLight(0xfff8e7, 1.8);
    sunLight.position.set(200, 250, 150);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 4096;
    sunLight.shadow.mapSize.height = 4096;
    sunLight.shadow.camera.left = -400;
    sunLight.shadow.camera.right = 400;
    sunLight.shadow.camera.top = 400;
    sunLight.shadow.camera.bottom = -400;
    sunLight.shadow.camera.far = 1500;
    sunLight.shadow.bias = -0.0005;
    scene.add(sunLight);

    // Enhanced terrain with better elevation
    createAdvancedTerrain();
    createHoles();

    window.addEventListener('resize', onWindowResize);
    animate();
}

function createAdvancedTerrain() {
    const geometry = new THREE.PlaneGeometry(800, 800, 128, 128);
    const positions = geometry.attributes.position;
    const posArray = positions.array;

    // Perlin-like noise for natural elevation
    for (let i = 0; i < posArray.length; i += 3) {
        const x = posArray[i] / 100;
        const y = posArray[i + 1] / 100;
        let elevation = 0;
        elevation += Math.sin(x * 0.5) * Math.cos(y * 0.5) * 8;
        elevation += Math.sin(x * 0.1) * Math.cos(y * 0.1) * 12;
        elevation += (Math.random() - 0.5) * 3;
        posArray[i + 2] = Math.max(0, elevation);
    }
    positions.needsUpdate = true;
    geometry.computeVertexNormals();

    const material = new THREE.MeshStandardMaterial({
        color: 0x2d5a35,
        roughness: 0.85,
        metalness: 0,
        wireframe: false,
    });

    const terrain = new THREE.Mesh(geometry, material);
    terrain.receiveShadow = true;
    terrain.rotation.x = -Math.PI / 2;
    terrain.scale.z = 1.2;
    scene.add(terrain);

    // Contour lines
    const contourGeometry = new THREE.BufferGeometry();
    const contourPoints = [];
    for (let z = -400; z < 400; z += 40) {
        for (let x = -400; x < 400; x += 2) {
            const h = (Math.sin(x * 0.01) + Math.sin(z * 0.01)) * 5;
            contourPoints.push(new THREE.Vector3(x, h, z));
        }
    }
    contourGeometry.setFromPoints(contourPoints);
    const contourMat = new THREE.LineBasicMaterial({ color: 0x1a3f22, opacity: 0.3, transparent: true });
    const contours = new THREE.LineSegments(contourGeometry, contourMat);
    scene.add(contours);
}

function createHoles() {
    const holePositions = generateHoleLayout();

    holePositions.forEach((pos, i) => {
        const holeNum = i + 1;
        const group = new THREE.Group();
        group.position.copy(new THREE.Vector3(pos.x, pos.y + 1, pos.z));

        // Green
        const greenGeom = new THREE.CircleGeometry(18, 32);
        const greenMat = new THREE.MeshStandardMaterial({
            color: 0x6abf7b,
            roughness: 0.65,
            metalness: 0,
        });
        const green = new THREE.Mesh(greenGeom, greenMat);
        green.receiveShadow = true;
        green.castShadow = true;
        green.rotation.x = -Math.PI / 2;
        group.add(green);

        // Flag
        const pole = new THREE.CylinderGeometry(0.6, 0.6, 18, 8);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a });
        const poleM = new THREE.Mesh(pole, poleMat);
        poleM.position.y = 9;
        poleM.castShadow = true;
        group.add(poleM);

        const flagGeom = new THREE.BoxGeometry(10, 6, 0.4);
        const flagMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0 });
        const flag = new THREE.Mesh(flagGeom, flagMat);
        flag.position.set(5, 16, 0);
        flag.castShadow = true;
        group.add(flag);

        // Hole number
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#c8a951';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(holeNum.toString(), 64, 64);

        const texture = new THREE.CanvasTexture(canvas);
        const spriteGeom = new THREE.PlaneGeometry(14, 14);
        const spriteMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
        const sprite = new THREE.Mesh(spriteGeom, spriteMat);
        sprite.position.y = 0.5;
        sprite.position.z = 9;
        group.add(sprite);

        // Bunkers
        if ([2, 4, 5, 7, 12, 13, 14, 15].includes(holeNum)) {
            const bunkerGeom = new THREE.CircleGeometry(10, 16);
            const bunkerMat = new THREE.MeshStandardMaterial({ color: 0xe8d9a0 });
            const bunker = new THREE.Mesh(bunkerGeom, bunkerMat);
            bunker.rotation.x = -Math.PI / 2;
            bunker.position.set(-25, 0.1, 20);
            bunker.receiveShadow = true;
            group.add(bunker);
        }

        // Water
        if ([11, 12, 13, 15, 16].includes(holeNum)) {
            const waterGeom = new THREE.CircleGeometry(14, 16);
            const waterMat = new THREE.MeshStandardMaterial({
                color: 0x4a90c2,
                metalness: 0.4,
                roughness: 0.3,
            });
            const water = new THREE.Mesh(waterGeom, waterMat);
            water.rotation.x = -Math.PI / 2;
            water.position.set(30, 0.05, 15);
            water.receiveShadow = true;
            group.add(water);
        }

        group.userData = { holeNum };
        scene.add(group);
    });
}

function generateHoleLayout() {
    // More realistic Augusta National hole spacing
    return [
        { x: -150, y: 0, z: 150 },  // 1 - Tea Olive
        { x: -100, y: 0, z: 180 },  // 2 - Pink Dogwood

// ============================================================
// UI UPDATES
// ============================================================
function updateLeaderboard() {
    const html = LEADERBOARD_R4_FINAL.map((p, i) => `
        <div class="leaderboard-player ${p.name === 'Scottie Scheffler' ? 'leader' : ''}">
            <div class="player-pos">${i + 1}</div>
            <div class="player-name-lb">${p.name}</div>
            <div class="player-score-lb" style="color:${getScoreColor(p.score)}">${p.score > 0 ? '+' : ''}${p.score}</div>
        </div>
    `).join('');
    document.getElementById('leaderboardContent').innerHTML = html;
}

function updateCommentary(hole) {
    const comment = COMMENTARY_MOMENTS[hole] || `<span class="commentary-hole">Hole ${hole}:</span> In play...`;
    document.getElementById('commentaryContent').innerHTML = comment;
}

function getScoreColor(score) {
    if (score < -7) return '#f1c40f';
    if (score < 0) return '#2ecc71';
    if (score === 0) return '#8899aa';
    return '#e74c3c';
}

function selectRound(round) {
    currentRound = round;
    document.querySelectorAll('.round-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-round="${round}"]`).classList.add('active');

    const total = round === 'all' ? '-11 (277)' : (() => {
        const scores = Object.values(SCHEFFLER_SCORES).slice(0, parseInt(round));
        const sum = scores.reduce((a, b) => a + b.reduce((x, y) => x + y, 0), 0);
        const vs = sum - (72 * parseInt(round));
        return `${vs > 0 ? '+' : ''}${vs} (${sum})`;
    })();
    document.getElementById('totalScore').textContent = total;
}

function toggleAnimation() {
    const btn = document.getElementById('playBtn');
    const controls = document.getElementById('animControls');

    if (!isAnimating) {
        isAnimating = true;
        animationHole = 1;
        btn.textContent = '⏸';
        controls.style.display = 'flex';
        animateRound4();
    } else {
        isAnimating = false;
        btn.textContent = '▶';
        controls.style.display = 'none';
    }
}

function playAnimation() {
    if (animationHole < 18) {
        animationHole++;
        updateCommentary(animationHole);
        document.getElementById('currentHole').textContent = animationHole;
        document.getElementById('progressBar').style.width = (animationHole / 18 * 100) + '%';
    }
}

function animateRound4() {
    if (!isAnimating || animationHole > 18) {
        isAnimating = false;
        document.getElementById('playBtn').textContent = '▶';
        document.getElementById('animControls').style.display = 'none';
        return;
    }

    playAnimation();
    setTimeout(animateRound4, 2000);
}

function toggleCommentary() {
    const btn = document.getElementById('commentBtn');
    const panel = document.getElementById('commentary');
    commentaryVisible = !commentaryVisible;
    panel.style.display = commentaryVisible ? 'block' : 'none';
    btn.classList.toggle('active', commentaryVisible);
}

function resetView() {
    isAnimating = false;
    animationHole = 0;
    document.getElementById('playBtn').textContent = '▶';
    document.getElementById('animControls').style.display = 'none';
    camera.position.set(0, 180, 250);
    controls.target.set(0, 0, 0);
    controls.autoRotate = true;
    updateCommentary(0);
}

function exportStats() {
    const stats = {
        tournament: "2024 Masters Tournament",
        location: "Augusta National Golf Club",
        champion: {
            name: "Scottie Scheffler",
            totalScore: 277,
            relative: "-11",
            roundScores: [66, 72, 71, 68]
        },
        courseInfo: COURSE,
        finalLeaderboard: LEADERBOARD_R4_FINAL,
        schefflerScores: SCHEFFLER_SCORES,
        timestamps: new Date().toISOString()
    };

    document.getElementById('exportData').value = JSON.stringify(stats, null, 2);
    document.getElementById('exportModal').classList.add('visible');
}

function copyToClipboard() {
    const textarea = document.getElementById('exportData');
    textarea.select();
    document.execCommand('copy');
    alert('Copied to clipboard!');
}

function closeExport() {
    document.getElementById('exportModal').classList.remove('visible');
}

function onWindowResize() {
    const canvas = document.getElementById('canvas');
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
    initThreeJS();
    updateLeaderboard();
    updateCommentary(0);
});
</script>
