<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Club Tracker — SFPL Libby</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,system-ui;
background:#f3f4f6;
margin:0;
color:#111827;
}

header{
padding:24px;
background:white;
border-bottom:1px solid #e5e7eb;
}

h1{
margin:0;
font-size:24px;
}

#updated{
font-size:12px;
color:#6b7280;
margin-top:4px;
}

#grid{
padding:24px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:16px;
}

.card{
background:white;
border-radius:12px;
padding:16px;
box-shadow:0 1px 3px rgba(0,0,0,.08);
}

.title{
font-weight:700;
font-size:15px;
}

.author{
font-size:12px;
color:#6b7280;
margin-bottom:8px;
}

.badge{
display:inline-block;
font-size:11px;
padding:4px 10px;
border-radius:6px;
margin-top:6px;
}

.available{
background:#dcfce7;
color:#166534;
}

.holds{
background:#fee2e2;
color:#991b1b;
}

.loading{
background:#e5e7eb;
color:#374151;
}

.links{
margin-top:10px;
}

.links a{
font-size:12px;
text-decoration:none;
margin-right:8px;
color:#2563eb;
}

</style>
</head>

<body>

<header>

<h1>📚 Book Club Tracker</h1>

<div id="updated">
Checking SFPL Libby ebook availability…
</div>

</header>

<div id="grid"></div>

<script>

const BOOKS = [
{id:"o24-01",title:"The Many Lives of Mama Love",author:"Lara Love Hardin"},
{id:"o24-02",title:"Long Island",author:"Colm Tóibín"},
{id:"o24-04",title:"Tell Me Everything",author:"Elizabeth Strout"},
{id:"r25-04",title:"Broken Country",author:"Clare Leslie Hall"}
]

let HOLDS = {}

async function loadHolds(){

try{

const r = await fetch("./holds.json?"+Date.now())

if(!r.ok) throw "no holds"

const data = await r.json()

HOLDS = data.books || {}

if(data.updated){

const d = new Date(data.updated)

document.getElementById("updated").textContent =
"SFPL Libby ebook holds updated " + d.toLocaleString()

}

render()

}catch(e){

document.getElementById("updated").textContent =
"Unable to load hold counts"

}

}

function badge(id){

const h = HOLDS[id]

if(!h)
return `<div class="badge loading">Checking…</div>`

if(h.status==="available")
return `<div class="badge available">${h.text}</div>`

if(h.status==="holds")
return `<div class="badge holds">${h.text}</div>`

return `<div class="badge loading">—</div>`

}

function libby(book){

return `https://libbyapp.com/search/sfpl/search/query-${encodeURIComponent(book.title)}`

}

function sfpl(book){

return `https://sfpl.bibliocommons.com/v2/search?query=${encodeURIComponent(book.title+" "+book.author)}&searchType=keyword&f_FORMAT=EBOOK`

}

function render(){

const grid=document.getElementById("grid")

grid.innerHTML=BOOKS.map(b=>`

<div class="card">

<div class="title">${b.title}</div>

<div class="author">${b.author}</div>

${badge(b.id)}

<div class="links">

<a href="${libby(b)}" target="_blank">Open in Libby</a>

<a href="${sfpl(b)}" target="_blank">View in SFPL</a>

</div>

</div>

`).join("")

}

render()

loadHolds()

</script>

</body>
</html>
