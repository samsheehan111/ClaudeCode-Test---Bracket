<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Book Club Tracker — Oprah & Reese × SFPL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Minimal CSS from your previous design */
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#f0f4f8;font-family:'Inter',system-ui,-apple-system,sans-serif;color:#1e293b}
#hdr{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 20px;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand-title{font-size:18px;font-weight:800;color:#0f172a}
.brand-sub{font-size:10px;color:#94a3b8}
#main{max-width:1280px;margin:20px auto;padding:0 20px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.card-top{padding:16px 16px 12px;flex:1}
.card-title{font-size:15px;font-weight:700;color:#0f172a;line-height:1.3;margin-bottom:3px}
.card-author{font-size:12px;color:#64748b;margin-bottom:8px}
.card-desc{font-size:11px;color:#64748b;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-bottom{padding:10px 16px 14px;border-top:1px solid #f1f5f9;display:flex;flex-direction:column;gap:8px}
.hold-badge{font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;margin-top:0;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.hold-badge.holds{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.hold-badge.available{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.hold-badge.loading{background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0}
</style>
</head>
<body>
<div id="hdr">
  <div class="hdr-inner">
    <div class="brand">
      <div class="brand-title">📚 Book Club × SFPL Tracker</div>
      <div class="brand-sub">Oprah's & Reese's picks · 2024–2026 · SF Public Library ebook wait times</div>
    </div>
  </div>
</div>
<div id="main">
  <div id="grid"></div>
</div>
<script>
'use strict';

// ─── BOOK DATA (2024–2025) ───
const BOOKS = [
{id:'o24-01', club:'oprah', year:2024, title:'The Many Lives of Mama Love', author:'Lara Love Hardin', genre:'Memoir', desc:'A suburban soccer mom secretly funded a heroin addiction…'},
{id:'o24-04', club:'oprah', year:2024, title:'Tell Me Everything', author:'Elizabeth Strout', genre:'Fiction', desc:'Pulitzer Prize winner Elizabeth Strout finally brings…'},
{id:'r25-04', club:'reese', year:2025, title:'Broken Country', author:'Clare Leslie Hall', genre:'Fiction', desc:'An unforgettable story of love, loss…'}
// Add the rest of your books here
];

// ─── HOLDS STATE ───
let HOLDS = {};
let holdsUpdated = null;

async function loadHolds() {
try {
const resp = await fetch('./holds.json?_=' + Date.now());
if (!resp.ok) return;
const data = await resp.json();
HOLDS = data.books || {};
holdsUpdated = data.updated || null;
renderCards();
} catch(e) {}
}

function holdBadgeHtml(id) {
const h = HOLDS[id];
if (!h) return `<div class="hold-badge loading">Loading…</div>`;
if (h.status === 'available') return `<div class="hold-badge available">0 holds · Available now</div>`;
if (h.status === 'holds') return `<div class="hold-badge holds">${h.holds} holds · ${h.copies} copies</div>`;
return `<div class="hold-badge loading">—</div>`;
}

function renderCards() {
const grid = document.getElementById('grid');
grid.innerHTML = BOOKS.map(b => `     <div class="card" id="card-${b.id}">       <div class="card-top">         <div class="card-title">${b.title}</div>         <div class="card-author">${b.author}</div>         <div class="card-desc">${b.desc}</div>       </div>       <div class="card-bottom">
        ${holdBadgeHtml(b.id)}       </div>     </div>`).join('');
}

renderCards();
loadHolds(); </script>

</body>
</html>
