<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oprah & Reese Book Club Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f6f8fb;
            margin: 0;
            padding: 40px;
            color: #1e293b;
        }

        h1 { margin-bottom: 6px; }
        .subtitle { color: #64748b; margin-bottom: 20px; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button.filter {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button.filter.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        input {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            min-width: 250px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 22px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(0,0,0,.05);
            border: 1px solid #eef2f7;
            transition: transform .15s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); }

        .cover-container {
            background: #f1f5f9;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .cover {
            width: 100%;
            height: 100%;
            /* 'contain' ensures the whole book cover is visible */
            object-fit: contain;
            padding: 10px;
        }

        .card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-grow: 1;
        }

        .title { font-size: 16px; font-weight: 700; line-height: 1.2; }
        .author { font-size: 14px; color: #64748b; }
        .rating { font-size: 13px; font-weight: 600; color: #b45309; }

        .club {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .oprah { background: #faf5ff; color: #7c3aed; border: 1px solid #ddd6fe; }
        .reese { background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; }

        .links {
            margin-top: auto;
            padding-top: 15px;
            display: flex;
            gap: 8px;
        }

        .link {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .lib { background: #eff6ff; color: #1d4ed8; }
        .libby { background: #f0fdf4; color: #15803d; }
    </style>
</head>
<body>

    <h1>📚 Book Club Tracker</h1>
    <div class="subtitle">Search Oprah and Reese's picks with SF Library shortcuts</div>

    <div class="controls">
        <input id="search" placeholder="Search by title or author...">
        <button class="filter active" onclick="setFilter('all', this)">All</button>
        <button class="filter" onclick="setFilter('oprah', this)">Oprah</button>
        <button class="filter" onclick="setFilter('reese', this)">Reese</button>
    </div>

    <div class="grid" id="grid"></div>

    <script>
        let BOOKS = [];
        let filter = "all";

        async function loadBooks() {
            try {
                const res = await fetch("./books.json");
                BOOKS = await res.json();
                render();
            } catch (err) {
                console.error("Error loading books.json:", err);
                document.getElementById("grid").innerHTML = "<p>Error loading book data. Make sure books.json exists!</p>";
            }
        }

        function setFilter(category, el) {
            filter = category;
            // Update button styles
            document.querySelectorAll(".filter").forEach(b => b.classList.remove("active"));
            el.classList.add("active");
            render();
        }

        document.getElementById("search").addEventListener("input", render);

        function render() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            const searchTerm = document.getElementById("search").value.toLowerCase();

            const filtered = BOOKS.filter(book => {
                const matchesFilter = (filter === "all" || book.club === filter);
                const matchesSearch = book.title.toLowerCase().includes(searchTerm) || 
                                     book.author.toLowerCase().includes(searchTerm);
                return matchesFilter && matchesSearch;
            });

            // Sort by rating (highest first)
            filtered.sort((a, b) => b.rating - a.rating);

            filtered.forEach(book => {
                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <div class="cover-container">
                        <img class="cover" 
                             src="${book.cover}" 
                             alt="${book.title}"
                             onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover+Found'">
                    </div>
                    <div class="card-body">
                        <div class="title">${book.title}</div>
                        <div class="author">by ${book.author}</div>
                        <div class="rating">⭐ ${book.rating} Goodreads</div>
                        <div>
                            <span class="club ${book.club}">
                                ${book.club === "oprah" ? "Oprah's Pick" : "Reese's Pick"}
                            </span>
                        </div>
                        <div class="links">
                            <button class="link lib" onclick="window.open('${book.sf_url}','_blank')">SF Library</button>
                            <button class="link libby" onclick="window.open('https://libbyapp.com/search/sfpl/search/query-${encodeURIComponent(book.title)}','_blank')">Libby</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        loadBooks();
    </script>
</body>
</html>
