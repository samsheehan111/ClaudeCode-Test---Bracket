<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Club Library Tracker</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:40px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,.1);
}

.title{
font-weight:bold;
font-size:18px;
margin-bottom:6px;
}

.author{
color:#666;
margin-bottom:10px;
}

.holds{
font-size:14px;
margin-bottom:10px;
}

.available{
color:green;
font-weight:bold;
}

.unavailable{
color:#cc0000;
font-weight:bold;
}

button{
padding:8px 12px;
border:none;
background:#0077cc;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#005fa3;
}

.updated{
margin-bottom:20px;
color:#666;
font-size:14px;
}

</style>
</head>

<body>

<h1>Oprah & Reese Book Club Tracker</h1>

<div class="updated" id="updated">Loading library data...</div>

<div class="grid" id="books"></div>

<script>

async function loadData(){

const booksRes = await fetch("./books.json")
const holdsRes = await fetch("./holds.json")

const books = await booksRes.json()
const holds = await holdsRes.json()

document.getElementById("updated").innerText =
"SF Public Library Libby ebook holds updated " + holds.updated

const grid = document.getElementById("books")
grid.innerHTML=""

books.forEach(book=>{

const holdData = holds.books[book.id]

let holdText=""
let holdClass="available"

if(!holdData || holdData.holds === 0){

holdText="Available now"
holdClass="available"

}else{

holdText=holdData.holds + " holds on " + holdData.copies + " copies"
holdClass="unavailable"

}

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="title">${book.title}</div>
<div class="author">${book.author}</div>
<div class="holds ${holdClass}">${holdText}</div>
<button onclick="window.open('${book.sf_url}','_blank')">View in SF Library</button>
`

grid.appendChild(card)

})

}

loadData()

</script>

</body>
</html>
