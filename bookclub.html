<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oprah & Reese Book Club Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#f6f8fb;
margin:0;
padding:40px;
color:#1e293b;
}

h1{
margin-bottom:6px;
}

.subtitle{
color:#64748b;
margin-bottom:20px;
}

.controls{
display:flex;
gap:10px;
margin-bottom:30px;
flex-wrap:wrap;
}

button.filter{
padding:6px 12px;
border-radius:6px;
border:1px solid #e2e8f0;
background:white;
cursor:pointer;
font-size:13px;
}

button.filter.active{
background:#2563eb;
color:white;
}

input{
padding:7px 10px;
border-radius:6px;
border:1px solid #e2e8f0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:22px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,.08);
border:1px solid #eef2f7;
transition:transform .15s;
}

.card:hover{
transform:translateY(-6px);
}

.card-body{
padding:16px;
display:flex;
flex-direction:column;
gap:6px;
}

.title{
font-size:16px;
font-weight:700;
}

.author{
font-size:14px;
color:#64748b;
}

.rating{
font-size:13px;
font-weight:600;
color:#b45309;
}

.club{
font-size:11px;
font-weight:700;
padding:4px 8px;
border-radius:6px;
display:inline-block;
margin-top:6px;
width:max-content;
}

.oprah{
background:#faf5ff;
color:#7c3aed;
border:1px solid #ddd6fe;
}

.reese{
background:#fff1f2;
color:#e11d48;
border:1px solid #fecdd3;
}

.links{
margin-top:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

button.link{
padding:6px 10px;
border:none;
border-radius:6px;
font-size:12px;
font-weight:600;
cursor:pointer;
}

.lib{
background:#eff6ff;
color:#1d4ed8;
}

.libby{
background:#f0fdf4;
color:#15803d;
}

</style>
</head>

<body>

<h1>📚 Oprah & Reese Book Club Tracker</h1>
<div class="subtitle">Explore book club picks and jump straight to SF Library or Libby</div>

<div class="controls">

<input id="search" placeholder="Search books">

<button class="filter active" onclick="setFilter('all')">All</button>
<button class="filter" onclick="setFilter('oprah')">Oprah</button>
<button class="filter" onclick="setFilter('reese')">Reese</button>

</div>

<div class="grid" id="grid"></div>

<script>

let BOOKS=[]
let filter="all"

async function loadBooks(){
  const res = await fetch("./books.json")
  BOOKS = await res.json()
async function fetchOpenLibraryData(title, author) {
  try {
    const q = encodeURIComponent(`${title} ${author}`)
    const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=ratings_average,ratings_count`)
    const data = await res.json()
    const doc = data.docs && data.docs[0]
    if (!doc) return {}
    return {
      rating: doc.ratings_average ? Math.round(doc.ratings_average * 10) / 10 : null,
      reviews: doc.ratings_count || null
    }
  } catch(e) {
    return {}
  }
}

async function loadBooks(){
  const res = await fetch("./books.json")
  BOOKS = await res.json()
  render()

  // Enrich with live Open Library data (real ratings)
  const results = await Promise.all(BOOKS.map(b => fetchOpenLibraryData(b.title, b.author)))
  BOOKS.forEach((book, i) => {
    if (results[i].rating != null) book.rating = results[i].rating
    if (results[i].reviews != null) book.reviews = results[i].reviews
  })
  render()
}

function setFilter(f){

filter=f

document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"))
event.target.classList.add("active")

render()

}

document.getElementById("search").addEventListener("input",render)

function render(){

const grid=document.getElementById("grid")
grid.innerHTML=""

const search=document.getElementById("search").value.toLowerCase()

BOOKS
.filter(book=>{

if(filter!=="all" && book.club!==filter) return false

if(search && !book.title.toLowerCase().includes(search) && !book.author.toLowerCase().includes(search)) return false

return true

})
.sort((a,b)=>(b.rating??0)-(a.rating??0))

.forEach(book=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="card-body">

<div class="title">${book.title}</div>

<div class="author">${book.author}</div>

<div class="rating">
${book.rating != null ? `⭐ ${book.rating} • ${(book.reviews??0).toLocaleString()} Goodreads ratings` : `Coming soon`}
</div>

<div class="club ${book.club}">
${book.club==="oprah"?"Oprah's Book Club":"Reese's Book Club"}
</div>

<div class="links">

<button class="link lib"
onclick="window.open('${book.sf_url}','_blank')">
SF Library
</button>

<button class="link libby"
onclick="window.open('https://libbyapp.com/search/sfpl/search/query-${book.title.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')}','_blank')">
Libby
</button>

</div>

</div>
`

grid.appendChild(card)

})

}

loadBooks()

</script>

</body>
</html>
