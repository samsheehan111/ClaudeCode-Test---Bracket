<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scottie Scheffler - 2024 Masters</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #004d35, #006747);
            padding: 12px;
            text-align: center;
            z-index: 10;
            border-bottom: 2px solid #c8a951;
        }

        .info h1 {
            font-size: 18px;
            margin: 0;
            color: #c8a951;
        }

        .info p {
            font-size: 12px;
            margin: 4px 0 0 0;
            color: #aaa;
        }

        .buttons {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        button {
            padding: 8px 16px;
            background: #c8a951;
            color: #004d35;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        button:active {
            opacity: 0.8;
        }

        .scoreboard {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 40, 0.95);
            padding: 12px;
            max-height: 140px;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.8;
            border-bottom: 1px solid #333;
            z-index: 15;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            border-bottom: 1px solid #333;
        }

        .hole-num {
            font-weight: bold;
            color: #c8a951;
            width: 30px;
        }

        .hole-score {
            color: #2ecc71;
            font-weight: bold;
            width: 30px;
        }
    </style>
</head>
<body>

<div class="info">
    <h1>🏌️ SCOTTIE SCHEFFLER - 2024 MASTERS</h1>
    <p>Final Score: -11 (277) • 4-Shot Victory</p>
</div>

<div class="scoreboard" id="scoreboard"></div>

<canvas id="canvas"></canvas>

<div class="buttons">
    <button onclick="resetCamera()">Reset</button>
    <button onclick="toggleAuto()">Auto Rotate</button>
    <button onclick="showScores()">Scores</button>
</div>

<script>
// Simple data
const HOLES = [
    {hole: 1, name: "Tea Olive", par: 4, score: 4},
    {hole: 2, name: "Pink Dogwood", par: 5, score: 4},
    {hole: 3, name: "Flowering Peach", par: 4, score: 4},
    {hole: 4, name: "Crab Apple", par: 3, score: 3},
    {hole: 5, name: "Magnolia", par: 4, score: 4},
    {hole: 6, name: "Juniper", par: 3, score: 3},
    {hole: 7, name: "Pampas", par: 4, score: 4},
    {hole: 8, name: "Yellow Jasmine", par: 5, score: 4},
    {hole: 9, name: "Carolina Cherry", par: 4, score: 4},
    {hole: 10, name: "Camellia", par: 4, score: 4},
    {hole: 11, name: "White Dogwood", par: 4, score: 4},
    {hole: 12, name: "Golden Bell", par: 3, score: 2},
    {hole: 13, name: "Azalea", par: 5, score: 4},
    {hole: 14, name: "Chinese Fir", par: 4, score: 4},
    {hole: 15, name: "Firethorn", par: 5, score: 4},
    {hole: 16, name: "Redbud", par: 3, score: 2},
    {hole: 17, name: "Nandina", par: 4, score: 4},
    {hole: 18, name: "Holly", par: 4, score: 4},
];

let scene, camera, renderer, controls;
let autoRotate = true;

// Initialize Three.js
function init() {
    const canvas = document.getElementById('canvas');

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1428);
    scene.fog = new THREE.Fog(0x0a1428, 500, 1000);

    camera = new THREE.PerspectiveCamera(
        50,
        canvas.clientWidth / canvas.clientHeight,
        0.1,
        2000
    );
    camera.position.set(0, 150, 200);

    renderer = new THREE.WebGLRenderer({canvas, antialias: true});
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = true;

    controls = new OrbitControls(camera, renderer.domElement);
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1;
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.minDistance = 80;
    controls.maxDistance = 400;

    // Lights
    const light1 = new THREE.HemisphereLight(0x87ceeb, 0x1a5a2d, 1.2);
    scene.add(light1);

    const light2 = new THREE.DirectionalLight(0xfff8e7, 1.5);
    light2.position.set(150, 200, 100);
    light2.castShadow = true;
    scene.add(light2);

    // Simple terrain
    const terrainGeo = new THREE.PlaneGeometry(600, 600, 32, 32);
    const terrainMat = new THREE.MeshStandardMaterial({color: 0x2d5a35});
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    terrain.rotation.x = -Math.PI / 2;
    terrain.receiveShadow = true;
    scene.add(terrain);

    // Add holes
    addHoles();

    window.addEventListener('resize', onWindowResize);
    showScores();
    animate();
}

function addHoles() {
    const positions = [
        {x: -150, z: 150}, {x: -100, z: 180}, {x: -30, z: 170}, {x: 40, z: 120},
        {x: 100, z: 60}, {x: 150, z: 0}, {x: 160, z: -60}, {x: 140, z: -130},
        {x: 80, z: -170}, {x: 20, z: -180}, {x: -50, z: -170}, {x: -120, z: -140},
        {x: -170, z: -100}, {x: -200, z: -40}, {x: -210, z: 30}, {x: -180, z: 100},
        {x: -120, z: 150}, {x: -50, z: 180}
    ];

    positions.forEach((pos, i) => {
        const group = new THREE.Group();
        group.position.set(pos.x, 0, pos.z);

        // Green
        const greenGeo = new THREE.CircleGeometry(18, 16);
        const greenMat = new THREE.MeshStandardMaterial({color: 0x6abf7b});
        const green = new THREE.Mesh(greenGeo, greenMat);
        green.rotation.x = -Math.PI / 2;
        green.receiveShadow = true;
        group.add(green);

        // Flag pole
        const poleGeo = new THREE.CylinderGeometry(0.5, 0.5, 15, 6);
        const poleMat = new THREE.MeshStandardMaterial({color: 0x333});
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.y = 7.5;
        pole.castShadow = true;
        group.add(pole);

        // Flag
        const flagGeo = new THREE.BoxGeometry(8, 5, 0.3);
        const flagMat = new THREE.MeshStandardMaterial({color: 0xf0f0f0});
        const flag = new THREE.Mesh(flagGeo, flagMat);
        flag.position.set(4, 14, 0);
        flag.castShadow = true;
        group.add(flag);

        // Hole number label (simple text)
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#c8a951';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText((i + 1).toString(), 32, 32);

        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.MeshBasicMaterial({map: texture, transparent: true});
        const spriteGeo = new THREE.PlaneGeometry(10, 10);
        const sprite = new THREE.Mesh(spriteGeo, spriteMat);
        sprite.position.y = 0.5;
        sprite.position.z = 9;
        group.add(sprite);

        scene.add(group);
    });
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

function onWindowResize() {
    const canvas = document.getElementById('canvas');
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
}

function resetCamera() {
    camera.position.set(0, 150, 200);
    controls.target.set(0, 0, 0);
}

function toggleAuto() {
    autoRotate = !autoRotate;
    controls.autoRotate = autoRotate;
}

function showScores() {
    let html = '<strong>Final Round (68, -4)</strong><br>';
    let total = 0;

    for (let i = 0; i < 9; i++) {
        const h = HOLES[i];
        total += h.score;
        const vs = h.score - h.par > 0 ? '+' : '';
        html += `<div class="score-row"><span class="hole-num">#${h.hole}</span><span>${h.name}</span><span class="hole-score">${h.score}(${vs}${h.score - h.par})</span></div>`;
    }
    html += '<strong style="display:block; margin-top: 8px;">Back 9</strong>';
    for (let i = 9; i < 18; i++) {
        const h = HOLES[i];
        total += h.score;
        const vs = h.score - h.par > 0 ? '+' : '';
        html += `<div class="score-row"><span class="hole-num">#${h.hole}</span><span>${h.name}</span><span class="hole-score">${h.score}(${vs}${h.score - h.par})</span></div>`;
    }

    document.getElementById('scoreboard').innerHTML = html;
}

// Start
window.addEventListener('load', init);
</script>

</body>
</html>
